name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  checks: write
  packages: write  

jobs:
  test:
    name: Tests
    runs-on: ubuntu-latest

    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Installer Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Installer les dépendances
        run: npm install

      - name: Lancer les tests
        run: chmod +x run-tests.sh && ./run-tests.sh

      - name: Publier le rapport de tests
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: Rapport de tests
          path: test-results/**/*.xml
          reporter: java-junit
          fail-on-error: true

  build:
    name: Build & Push image Docker
    runs-on: ubuntu-latest
    needs: test 

    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Se connecter au GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Calculer le tag (branche-sha)
        id: tag
        run: echo "value=${{ github.ref_name }}-${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Construire et pousser l'image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ghcr.io/${{ github.repository }}:${{ steps.tag.outputs.value }}
